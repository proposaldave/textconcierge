function Avatar({ sender, size = 26 }) {
  const p = PLAYERS[sender] || { initials: "?", color: "#6B7280" };
  const isGnT = p.isGnT;
  return (
    <div style={{
      width: size, height: size, borderRadius: "50%",
      background: isGnT ? `linear-gradient(135deg, ${BRAND.navy}, ${BRAND.blue})` : p.color,
      display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0,
      border: isGnT ? `2px solid ${BRAND.cyan}` : "none", boxSizing: "border-box",
    }}>
      <span style={{ color: "#fff", fontSize: size * (isGnT ? 0.32 : 0.4), fontWeight: 700 }}>{p.initials}</span>
    </div>
  );
}

function TypingDots() {
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 6, padding: "4px 0" }}>
      <Avatar sender="gnt" size={22} />
      <div style={{ background: "#E5E7EB", borderRadius: "14px 14px 14px 4px", padding: "9px 14px", display: "flex", gap: 4 }}>
        {[0, 1, 2].map((i) => (
          <div key={i} style={{ width: 5, height: 5, borderRadius: "50%", background: "#9CA3AF", animation: `bounce 1.2s ease-in-out ${i * 0.2}s infinite` }} />
        ))}
      </div>
    </div>
  );
}

function MessageBubble({ sender, text, time, isDM }) {
  if (sender === "system") {
    return <div style={{ textAlign: "center", padding: "6px 0", color: "#9CA3AF", fontSize: 10, fontWeight: 500 }}>{text}</div>;
  }
  const isMe = !isDM ? sender === "dave" : sender !== "gnt";
  const isGnT = sender === "gnt";
  return (
    <div style={{ display: "flex", flexDirection: isMe ? "row-reverse" : "row", alignItems: "flex-end", gap: 5, padding: "2px 0", animation: "fadeIn 0.3s ease-out" }}>
      {!isMe && <Avatar sender={sender} size={22} />}
      <div style={{ maxWidth: "80%" }}>
        {isMe && (
          <div style={{ fontSize: 9, color: BRAND.blue, fontWeight: 600, marginBottom: 1, marginRight: 3, textAlign: "right" }}>
            {PLAYERS[sender]?.name || "You"}
          </div>
        )}
        {!isMe && (
          <div style={{ fontSize: 9, color: isGnT ? BRAND.cyan : "#6B7280", fontWeight: isGnT ? 700 : 600, marginBottom: 1, marginLeft: 3 }}>
            {PLAYERS[sender]?.name || sender}
            {isGnT && <span style={{ fontSize: 8, fontWeight: 500, marginLeft: 3, color: BRAND.teal, background: "rgba(13,148,136,0.12)", padding: "1px 4px", borderRadius: 3 }}>AI</span>}
          </div>
        )}
        <div style={{
          background: isMe ? BRAND.blue : isGnT ? "linear-gradient(135deg, #F0FDFA, #E0F7FA)" : "#F3F4F6",
          color: isMe ? "#fff" : "#111827",
          borderRadius: isMe ? "14px 14px 4px 14px" : "14px 14px 14px 4px",
          padding: "7px 11px", fontSize: 12.5, lineHeight: 1.45, whiteSpace: "pre-wrap",

  );
}

// ─── Graph Visualization ───
function GraphVisualization({ revealStage, totalSignals }) {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const timeRef = useRef(0);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;

    let edges = [];
    for (let i = 0; i < Math.min(revealStage, DEMOS.length); i++) {
      if (GRAPH_EDGES_BY_DEMO[i]) edges = edges.concat(GRAPH_EDGES_BY_DEMO[i]);
    }
    if (revealStage >= DEMOS.length + 1) edges = edges.concat(AMBIENT_EDGES);

    const edgeMap = {};
    edges.forEach((e) => {
      const key = [e.from, e.to].sort().join("-");
      if (!edgeMap[key]) edgeMap[key] = { ...e, strength: 0 };
      edgeMap[key].strength = Math.min(edgeMap[key].strength + e.strength, 6);
    });
    const dedupedEdges = Object.values(edgeMap);

    const visibleNodeIds = new Set();
    if (revealStage >= 1) ["dave", "caleb", "ben", "dylan"].forEach((n) => visibleNodeIds.add(n)); // Auto-Schedule
    if (revealStage >= 3) visibleNodeIds.add("mike"); // Cancel-Referral
    if (revealStage >= 4) ["emma", "sarah"].forEach((n) => visibleNodeIds.add(n)); // Find 4th
    if (revealStage >= 5) visibleNodeIds.add("prodave"); // Friends Class
    if (revealStage >= 7) visibleNodeIds.add("rick"); // Not a fit
    if (revealStage >= 8) visibleNodeIds.add("marcus"); // Coach #1
    if (revealStage >= 12) visibleNodeIds.add("tony"); // Large Group
    if (revealStage >= DEMOS.length + 1) ["pat", "laurie", "tom", "chris", "alex"].forEach((n) => visibleNodeIds.add(n));
    const visibleNodes = GRAPH_NODES.filter((n) => visibleNodeIds.has(n.id));

    const draw = () => {
      timeRef.current += 0.015;
      const t = timeRef.current;
      ctx.clearRect(0, 0, W, H);

      dedupedEdges.forEach((edge) => {
        const fromNode = GRAPH_NODES.find((n) => n.id === edge.from);
        const toNode = GRAPH_NODES.find((n) => n.id === edge.to);
        if (!fromNode || !toNode || !visibleNodeIds.has(edge.from) || !visibleNodeIds.has(edge.to)) return;
        const x1 = fromNode.x * W, y1 = fromNode.y * H, x2 = toNode.x * W, y2 = toNode.y * H;
        const alpha = Math.min(0.15 + edge.strength * 0.1, 0.7);
        const width = 0.5 + edge.strength * 0.4;
        const pulsePos = (t * 0.3 + edge.strength * 0.1) % 1;
        const px = x1 + (x2 - x1) * pulsePos, py = y1 + (y2 - y1) * pulsePos;
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
        ctx.strokeStyle = `rgba(0, 163, 224, ${alpha})`; ctx.lineWidth = width; ctx.stroke();
        if (edge.strength >= 3) {
          ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(0, 163, 224, ${0.6 + Math.sin(t * 3) * 0.3})`; ctx.fill();
        }
      });

      visibleNodes.forEach((node) => {
        const x = node.x * W, y = node.y * H;
        const player = PLAYERS[node.id];
        const nodeColor = player ? player.color : BRAND.cyan;
        const glow = ctx.createRadialGradient(x, y, 0, x, y, 22);
        glow.addColorStop(0, `${nodeColor}44`); glow.addColorStop(1, `${nodeColor}00`);
        ctx.fillStyle = glow; ctx.fillRect(x - 22, y - 22, 44, 44);
        ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI * 2);
        ctx.fillStyle = nodeColor; ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 1; ctx.stroke();
        ctx.fillStyle = BRAND.white; ctx.font = "bold 9px -apple-system, sans-serif";
        ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(node.label, x, y + 18);
      });
      animRef.current = requestAnimationFrame(draw);
    };
    draw();
    return () => { if (animRef.current) cancelAnimationFrame(animRef.current); };
  }, [revealStage]);

  const nodeCount = revealStage >= DEMOS.length + 1 ? 16 : revealStage >= 12 ? 11 : revealStage >= 8 ? 10 : revealStage >= 7 ? 9 : revealStage >= 5 ? 8 : revealStage >= 4 ? 7 : revealStage >= 3 ? 5 : revealStage >= 1 ? 4 : 0;

  return (
    <div style={{ position: "relative", width: 300, height: 540, borderRadius: 32, background: "#000", padding: 6, boxShadow: "0 20px 50px rgba(0,0,0,0.4)", flexShrink: 0 }}>
      <div style={{ position: "absolute", top: 6, left: "50%", transform: "translateX(-50%)", width: 80, height: 20, background: "#000", borderRadius: "0 0 14px 14px", zIndex: 20 }} />
      <div style={{ width: "100%", height: "100%", borderRadius: 26, overflow: "hidden", background: BRAND.dark, display: "flex", flexDirection: "column" }}>
        <div style={{ padding: "34px 14px 8px", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: BRAND.cyan, letterSpacing: "0.04em" }}>GIVE 'N TAKE GRAPH</div>
          <div style={{ fontSize: 9, color: BRAND.gray, marginTop: 2 }}>{totalSignals} signals captured · {nodeCount} players connected</div>
        </div>
        <div style={{ flex: 1, position: "relative", padding: 8 }}>
          <canvas ref={canvasRef} width={276} height={380} style={{ width: "100%", height: "100%" }} />
        </div>
        <div style={{ padding: "8px 14px 20px", borderTop: "1px solid rgba(255,255,255,0.06)" }}>
          {revealStage < DEMOS.length + 1 ? (
            <div style={{ fontSize: 10, color: BRAND.gray, textAlign: "center" }}>Graph builds with each interaction...</div>
          ) : (
            <div style={{ textAlign: "center" }}>
              <div style={{ fontSize: 10, color: BRAND.cyan, fontWeight: 700 }}>Every conversation makes the graph smarter</div>
              <div style={{ fontSize: 9, color: BRAND.gray, marginTop: 2 }}>Compatibility · Reliability · Preferences · Trust</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── Intelligence Pipeline View ───
function IntelligencePipeline() {
  const canvasRef = useRef(null);
  const animRef = useRef(null);
  const timeRef = useRef(0);
  const [activeStep, setActiveStep] = useState(-1);
  const [dataPoints, setDataPoints] = useState(0);
  const [showFlywheel, setShowFlywheel] = useState(false);

  // Auto-animate through pipeline steps
  useEffect(() => {
    const steps = [0, 1, 2, 3, 4, 5];
    let i = 0;
    const interval = setInterval(() => {
      if (i < steps.length) {
        setActiveStep(steps[i]);
        setDataPoints(prev => prev + Math.floor(Math.random() * 40) + 20);
        i++;
      } else {
        setShowFlywheel(true);
        clearInterval(interval);
      }
    }, 1200);
    // Start first step immediately
    setTimeout(() => { setActiveStep(0); setDataPoints(12); }, 300);
    return () => clearInterval(interval);
  }, []);

  // Animated social graph canvas
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const W = canvas.width;
    const H = canvas.height;

    // Generate nodes that grow over time
    const allNodes = [];
    for (let i = 0; i < 60; i++) {
      allNodes.push({
        x: 0.1 + Math.random() * 0.8,
        y: 0.1 + Math.random() * 0.8,
        size: 2 + Math.random() * 4,
        color: [BRAND.cyan, BRAND.blue, BRAND.teal, BRAND.burgundyLight, "#7C3AED", "#DB2777", "#059669"][i % 7],
        speed: 0.2 + Math.random() * 0.5,
        phase: Math.random() * Math.PI * 2,
        appearAt: i * 0.08, // stagger appearance
      });
    }

    // Generate edges
    const allEdges = [];
    for (let i = 0; i < allNodes.length; i++) {
      const numEdges = 1 + Math.floor(Math.random() * 3);
      for (let e = 0; e < numEdges; e++) {
        const target = (i + 1 + Math.floor(Math.random() * 8)) % allNodes.length;
        if (target !== i) {
          allEdges.push({ from: i, to: target, strength: 1 + Math.random() * 3, appearAt: Math.max(allNodes[i].appearAt, allNodes[target].appearAt) + 0.2 });
        }
      }
    }

    const draw = () => {
      timeRef.current += 0.012;
      const t = timeRef.current;
      ctx.clearRect(0, 0, W, H);

      // Draw edges
      allEdges.forEach(edge => {
        if (t < edge.appearAt) return;
        const fadeIn = Math.min((t - edge.appearAt) * 2, 1);
        const fromNode = allNodes[edge.from];
        const toNode = allNodes[edge.to];
        const x1 = fromNode.x * W, y1 = fromNode.y * H;
        const x2 = toNode.x * W, y2 = toNode.y * H;
        const alpha = fadeIn * (0.08 + edge.strength * 0.04);
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = `rgba(0, 163, 224, ${alpha})`;
        ctx.lineWidth = 0.5 + edge.strength * 0.2;
        ctx.stroke();

        // Pulse along strong edges
        if (edge.strength > 2 && fadeIn >= 1) {
          const pulsePos = (t * 0.4 + edge.from * 0.1) % 1;
          const px = x1 + (x2 - x1) * pulsePos;
          const py = y1 + (y2 - y1) * pulsePos;
          ctx.beginPath();
          ctx.arc(px, py, 1.5, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(0, 163, 224, ${0.4 + Math.sin(t * 3) * 0.3})`;
          ctx.fill();
        }
      });

      // Draw nodes
      allNodes.forEach((node, i) => {
        if (t < node.appearAt) return;
        const fadeIn = Math.min((t - node.appearAt) * 3, 1);
        const x = node.x * W + Math.sin(t * node.speed + node.phase) * 2;
        const y = node.y * H + Math.cos(t * node.speed * 0.7 + node.phase) * 2;

        // Glow
        const glow = ctx.createRadialGradient(x, y, 0, x, y, node.size * 3);
        glow.addColorStop(0, `${node.color}${Math.round(fadeIn * 30).toString(16).padStart(2, '0')}`);
        glow.addColorStop(1, `${node.color}00`);
        ctx.fillStyle = glow;
        ctx.fillRect(x - node.size * 3, y - node.size * 3, node.size * 6, node.size * 6);

        // Node dot
        ctx.beginPath();
        ctx.arc(x, y, node.size * fadeIn, 0, Math.PI * 2);
        ctx.fillStyle = node.color + Math.round(fadeIn * 255).toString(16).padStart(2, '0');
        ctx.fill();
      });

      // Overlay counter
      const visibleNodes = allNodes.filter(n => t >= n.appearAt).length;
      const visibleEdges = allEdges.filter(e => t >= e.appearAt).length;
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.fillRect(W - 95, H - 38, 90, 34);
      ctx.fillStyle = BRAND.cyan;
      ctx.font = "bold 10px -apple-system, sans-serif";
      ctx.textAlign = "right";
      ctx.fillText(`${visibleNodes} players`, W - 10, H - 22);
      ctx.fillStyle = BRAND.gray;
      ctx.font = "9px -apple-system, sans-serif";
      ctx.fillText(`${visibleEdges} connections`, W - 10, H - 10);

      animRef.current = requestAnimationFrame(draw);
    };

  }, []);

                {i < 4 && <div style={{ color: BRAND.grayDark, fontSize: 9, fontWeight: 700, flexShrink: 0 }}>→</div>}
              </Fragment>
            ))}
          </div>
          <div style={{ textAlign: "center", marginTop: 6 }}>
            <div style={{ fontSize: 9, color: BRAND.cyan, fontWeight: 600 }}>↻ Cycle 1: good. Cycle 100: unbeatable.</div>
          </div>
        </div>
      </div>
    </Fragment>
  );
}

// ─── Main App ───
function GnTDemo() {
  const [activeDemo, setActiveDemo] = useState(0);
  const [visibleCount, setVisibleCount] = useState(0);
  const [showTyping, setShowTyping] = useState(false);
  const [isPlaying, setIsPlaying] = useState(false);
  const [isPaused, setIsPaused] = useState(false);
  const [completedDemos, setCompletedDemos] = useState(new Set());
  const [showGraph, setShowGraph] = useState(false);
  const [showIntelligence, setShowIntelligence] = useState(false);
  const [graphRevealStage, setGraphRevealStage] = useState(0);
  const [graphFullReveal, setGraphFullReveal] = useState(false);
  const [liveSignals, setLiveSignals] = useState([]);
  const [liveSignalCount, setLiveSignalCount] = useState(0);
  const [completedSignals, setCompletedSignals] = useState(0);

  const timeoutsRef = useRef([]);
  const pausedAtRef = useRef(0);

  const clearTimeouts = () => {
    timeoutsRef.current.forEach(clearTimeout);
    timeoutsRef.current = [];
  };

  const currentDemo = DEMOS[activeDemo];
  const isGraphView = showGraph;
  const isIntelligenceView = showIntelligence;

  const scheduleMessages = useCallback((msgs, fromIndex, baseDelay) => {
    clearTimeouts();
    const offsetDelay = fromIndex > 1 ? msgs[fromIndex - 1].delay || 0 : 0;

    for (let i = fromIndex; i < msgs.length; i++) {
      const msg = msgs[i];
      if (i === 0) continue;
      const isGnT = msg.sender === "gnt";
      const adjustedDelay = (msg.delay - offsetDelay) + baseDelay;

      if (isGnT) {
        const t1 = setTimeout(() => setShowTyping(true), Math.max(adjustedDelay - 500, 0));
        timeoutsRef.current.push(t1);
      }

      const capturedSignals = msg.signals || [];
      const t2 = setTimeout(() => {
        setShowTyping(false);
        setVisibleCount(i + 1);
        pausedAtRef.current = i + 1;

        if (capturedSignals.length > 0) {
          setLiveSignals((prev) => [...prev, ...capturedSignals]);
          setLiveSignalCount((prev) => prev + capturedSignals.length);
        }

        if (i === msgs.length - 1) {
          setTimeout(() => {
            setIsPlaying(false);
            setIsPaused(false);
            setCompletedDemos((prev) => new Set([...prev, activeDemo]));
            setLiveSignalCount((curr) => {
              setCompletedSignals((prevCompleted) => prevCompleted + curr);
              return curr;
            });
            setGraphRevealStage(activeDemo + 1);
          }, 400);
        }
      }, adjustedDelay);
      timeoutsRef.current.push(t2);
    }
  }, [activeDemo]);

  const playDemo = useCallback(() => {
    if (isPlaying && !isPaused) return;
    const msgs = currentDemo.messages;

    if (isPaused) {
      setIsPaused(false);
      setIsPlaying(true);
      scheduleMessages(msgs, pausedAtRef.current, 300);
    } else {
      setLiveSignals([]);
      setLiveSignalCount(0);
      setVisibleCount(1);
      setShowTyping(false);
      setIsPlaying(true);
      setIsPaused(false);
      pausedAtRef.current = 1;
      scheduleMessages(msgs, 1, 0);
    }
  }, [activeDemo, currentDemo, isPlaying, isPaused, scheduleMessages]);

  const pauseDemo = useCallback(() => {
    clearTimeouts();
    setShowTyping(false);
    setIsPlaying(false);
    setIsPaused(true);
  }, []);

  const switchDemo = (index) => {
    if (index === activeDemo && !isPlaying) return;
    clearTimeouts();
    setVisibleCount(1);
    setShowTyping(false);
    setIsPlaying(false);
    setIsPaused(false);
    setLiveSignals([]);
    setLiveSignalCount(0);
    pausedAtRef.current = 0;
    setActiveDemo(index);
    setShowGraph(false);
    setShowIntelligence(false);
  };

  const showGraphView = () => {
    if (isPlaying) return;
    setShowGraph(true);
    setShowIntelligence(false);
    if (!graphFullReveal) {
      setGraphFullReveal(true);
      setTimeout(() => setGraphRevealStage(DEMOS.length + 1), 600);
    }
  };

  const showIntelligenceView = () => {
    if (isPlaying) return;
    setShowIntelligence(true);
    setShowGraph(false);
  };

  useEffect(() => () => clearTimeouts(), []);

  const allDemosComplete = completedDemos.size === DEMOS.length;

  const dmDemos = DEMOS.map((d, i) => ({ ...d, index: i })).filter((d) => d.category === "dm");
  const coordDemos = DEMOS.map((d, i) => ({ ...d, index: i })).filter((d) => d.category === "coordinator");

                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 9, color: BRAND.grayDark }}>Utilization</div>
                  <div style={{ display: "flex", alignItems: "baseline", gap: 4, marginTop: 2 }}>
                    <span style={{ fontSize: 13, color: BRAND.grayDark, textDecoration: "line-through" }}>56%</span>
                    <span style={{ fontSize: 10, color: BRAND.grayDark }}>→</span>
                    <span style={{ fontSize: 13, color: "#F59E0B" }}>64%</span>
                    <span style={{ fontSize: 10, color: BRAND.grayDark }}>→</span>
                    <span style={{ fontSize: 16, fontWeight: 800, color: BRAND.greenConfirm }}>85%</span>
                  </div>
                </div>
                <div style={{ borderLeft: "1px solid rgba(255,255,255,0.08)", paddingLeft: 12 }}>
                  <div style={{ fontSize: 9, color: BRAND.grayDark }}>Annual Boost</div>
                  <div style={{ fontSize: 20, fontWeight: 800, color: BRAND.greenConfirm, lineHeight: 1.2, marginTop: 2 }}>+$250K</div>
                  <div style={{ fontSize: 8, color: BRAND.grayDark }}>per club</div>
                </div>
              </div>
            </div>

            {/* The Flywheel — manual → autonomous → community graph */}
            <div style={{ background: BRAND.darkCard, borderRadius: 10, border: "1px solid rgba(255,255,255,0.06)", padding: "10px 14px" }}>
              <div style={{ fontSize: 9, fontWeight: 700, color: BRAND.gray, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 8 }}>
                🔄 The Compounding Flywheel
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                {[
                  { label: "Text\nScheduling", color: BRAND.blue, icon: "📱" },
                  { label: "Signal\nCapture", color: BRAND.cyan, icon: "📡" },
                  { label: "Better\nMatches", color: BRAND.teal, icon: "🎯" },
                  { label: "More\nPlay", color: BRAND.greenConfirm, icon: "📈" },
                ].map((step, i) => (
                  <Fragment key={i}>
                    <div style={{ textAlign: "center", flex: 1 }}>
                      <div style={{ width: 36, height: 36, borderRadius: "50%", background: `${step.color}22`, border: `2px solid ${step.color}66`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto", fontSize: 14 }}>
                        {step.icon}
                      </div>
                      <div style={{ fontSize: 8, color: step.color, fontWeight: 700, marginTop: 4, lineHeight: 1.2, whiteSpace: "pre-line" }}>{step.label}</div>
                    </div>
                    {i < 3 && <div style={{ color: BRAND.grayDark, fontSize: 10, fontWeight: 700, flexShrink: 0 }}>→</div>}
                  </Fragment>
                ))}
              </div>
              <div style={{ textAlign: "center", marginTop: 6 }}>
                <div style={{ fontSize: 8, color: BRAND.grayDark }}>↻ Each cycle makes the next one smarter</div>
              </div>
            </div>

            <button onClick={() => { setShowGraph(false); setShowIntelligence(false); setActiveDemo(0); }} style={{
              background: "rgba(255,255,255,0.04)", color: BRAND.gray, border: "1px solid rgba(255,255,255,0.08)",
              borderRadius: 8, padding: "8px 14px", fontSize: 11, cursor: "pointer", textAlign: "center",
            }}>
              ← Back to demos
            </button>
          </div>
        )}

      </div>

      {/* Play / Pause Button */}
      {!isGraphView && !isIntelligenceView && (
        <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
          {isPlaying ? (
            <button onClick={pauseDemo} style={{
              background: `linear-gradient(135deg, ${BRAND.burgundy}, ${BRAND.burgundyLight})`,
              color: "#fff", border: `1px solid ${BRAND.burgundyLight}66`, borderRadius: 10,
              padding: "10px 28px", fontSize: 13, fontWeight: 700, cursor: "pointer",
              boxShadow: `0 4px 16px ${BRAND.burgundy}66`, transition: "all 0.2s",
            }}>⏸ Pause</button>
          ) : (
            <button onClick={playDemo} style={{
              background: `linear-gradient(135deg, ${BRAND.teal}, ${BRAND.greenConfirm})`,
              color: "#fff", border: `1px solid ${BRAND.greenConfirm}66`, borderRadius: 10,
              padding: "10px 28px", fontSize: 13, fontWeight: 700, cursor: "pointer",
              boxShadow: `0 4px 16px ${BRAND.teal}88`, transition: "all 0.2s",
            }}>
              {isPaused ? "▶ Resume" : completedDemos.has(activeDemo) ? "↻ Replay" : "▶ Play"}
            </button>
          )}
        </div>
      )}

      {/* Bottom Tagline */}
      <div style={{ marginTop: 20, textAlign: "center", maxWidth: 440 }}>
        <div style={{ fontSize: 12, color: BRAND.grayLight, lineHeight: 1.5 }}>
          {isIntelligenceView ? (
            <span>
              <span style={{ color: BRAND.white }}>Other platforms match on one number.</span>
              <br />
              <span style={{ color: BRAND.cyan, fontWeight: 700 }}>
                GnT matches on the full picture — skill, chemistry, reliability, and timing.
              </span>
            </span>
          ) : isGraphView ? (
            <span>
              <span style={{ color: BRAND.white }}>Social media built the Social Graph to optimize attention.</span>
              <br />
              <span style={{ color: BRAND.cyan, fontWeight: 700 }}>
                Give 'n Take builds the Give 'n Take Graph to optimize who you play with in real life.
              </span>
            </span>
          ) : (
            <span>
              Play all demos to unlock <span style={{ color: BRAND.cyan, fontWeight: 700 }}>The Give 'n Take Graph</span> — the real intelligence underneath.
            </span>
          )}
        </div>
      </div>
    </div>
  );
}


ReactDOM.render(React.createElement(GnTDemo), document.getElementById('root'));
</script>
</body>
</html>
